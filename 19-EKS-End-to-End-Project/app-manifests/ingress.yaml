apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  tls:
  - hosts:
    - samone.store
    - api.samone.store
    secretName: frontend-tls-secret
  rules:
    # Frontend
    - host: samone.store
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: frontend
              port:
                number: 80

    # Backend
    - host: api.samone.store
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: backend    
              port:
                number: 3500