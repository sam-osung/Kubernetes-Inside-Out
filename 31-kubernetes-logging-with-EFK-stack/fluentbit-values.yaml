# fluentbit-values.yaml
# =====================
# This file contains configuration values for deploying Fluent Bit via Helm as part of an EFK stack.

kind: DaemonSet  # Deploy Fluent Bit as a DaemonSet (one pod per node)
# If you prefer, you could use "Deployment" instead (then replicaCount applies)

image:
  repository: cr.fluentbit.io/fluent/fluent-bit  # Container image for Fluent Bit
  tag: 2.2.3                                    # Version tag to use
  pullPolicy: IfNotPresent                       # Pull image only if not present locally

serviceAccount:
  create: true  # Create a dedicated service account for Fluent Bit pods
# If you already have a service account, you can provide its name here

rbac:
  create: true  # Create necessary RBAC permissions (ClusterRole/Role + Bindings)
# Ensures Fluent Bit can access the Kubernetes API to enrich logs with pod metadata

daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log  # Mount host /var/log into container
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers  # Mount container logs directory from host
# Volumes needed to read container logs directly from the node

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
# Mount the volumes into the Fluent Bit pod, read-only for safety

config:
  service: |
    [SERVICE]
        Flush 1
        Log_Level info
        Parsers_File /fluent-bit/etc/parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Health_Check On
# SERVICE section controls global Fluent Bit behavior:
# Flush: how often to send logs to output (in seconds)
# Log_Level: logging verbosity
# HTTP_Server + HTTP_Port: enable metrics/health endpoints

  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Tag kube.*
# INPUT section defines where Fluent Bit reads logs from
# Tail plugin reads container logs, supports multi-line logs

  filters: |
    [FILTER]
        Name kubernetes
        Match kube.*
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On
# FILTER section enriches logs with Kubernetes metadata:
# Pod name, namespace, container name, labels
# Can also exclude logs from certain pods/namespaces

  outputs: |
    [OUTPUT]
        Name es
        Match kube.*
        Host elasticsearch-master.logging.svc.cluster.local
        Port 9200
        HTTP_User elastic
        HTTP_Passwd fANNfjInGzsWrbSo
        tls On
        tls.verify Off
        Logstash_Format On
        Logstash_Prefix logstash
        Retry_Limit False
        Suppress_Type_Name On  
# OUTPUT section defines where logs go:
# Here we send them to Elasticsearch
# Logstash_Format ensures index names follow a logstash-* pattern
# Suppress_Type_Name disables sending the deprecated `_type` field for ES 8+