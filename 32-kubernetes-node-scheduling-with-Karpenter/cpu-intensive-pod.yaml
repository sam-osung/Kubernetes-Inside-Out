apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-intensive
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cpu-intensive
  template:
    metadata:
      labels:
        app: cpu-intensive
    spec:
      tolerations:
        - key: dedicated
          operator: Equal
          value: high-cpu
          effect: NoSchedule
      containers:
        - name: stress
          image: nginx
          resources:
            requests:
              cpu: "2000m"