apiVersion: apps/v1
kind: Deployment
metadata:
  name: dns-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dns-demo
  template:
    metadata:
      labels:
        app: dns-demo
    spec:
      containers:
      - name: app
        image: busybox
        command:
        - sh
        - -c
        - sleep 360000
